<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --accent: #ff5f40;
      --bg: #121214;
      --bg-card: rgba(30, 30, 35, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f5f5f7;
      --text-muted: #8e8e93;
    }
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    select, input[type="number"] {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }
    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 4px var(--accent);
    }
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .footer {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
    }
    #save-status {
      font-size: 11px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <h1>
    <div class="logo-dot"></div>
    Loupe Settings
  </h1>

  <div class="section">
    <div class="row">
      <span class="label">Default Mode</span>
      <select id="default-mode">
        <option value="overlay">Rich Overlay (B)</option>
        <option value="fullscreen">Minimal Fullscreen (A)</option>
      </select>
    </div>
  </div>

  <div class="section slider-container">
    <div class="row">
      <span class="label">Magnifier Scale</span>
      <span id="zoom-val" style="font-size: 12px; font-weight: 600; color: var(--accent);">2.5x</span>
    </div>
    <input type="range" id="magnifier-zoom" min="1.5" max="5.0" step="0.5" value="2.5">
  </div>

  <div class="section">
    <div class="row">
      <span class="label">Minimum Size Threshold</span>
      <div style="display: flex; gap: 4px; align-items: center;">
        <input type="number" id="min-width" value="40" style="width: 44px;">
        <span style="font-size: 11px; color: var(--text-muted);">x</span>
        <input type="number" id="min-height" value="40" style="width: 44px;">
      </div>
    </div>
    <div class="row">
      <span class="label">Include Icons/Small UI</span>
      <input type="checkbox" id="include-small">
    </div>
  </div>

  <div class="section" style="gap: 6px;">
    <span class="label">Keyboard Shortcut</span>
    <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
      <div id="shortcut-box" tabIndex="0" style="flex: 1; background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 6px; text-align: center; font-size: 11px; font-family: monospace; color: var(--text); cursor: pointer; outline: none; transition: border-color 0.2s;" title="Click to record new hotkey">
        Ctrl+Shift+F
      </div>
      <button id="reset-shortcut-btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); padding: 6px 10px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">
        Reset
      </button>
    </div>
  </div>

  <button id="trigger-btn" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    Trigger Loupe on Tab
  </button>

  <div class="footer">
    <span id="hotkey-display">Hotkey: Ctrl+Shift+F</span>
    <span id="save-status">Saved</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
